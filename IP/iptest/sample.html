<!DOCTYPE html>
<html>
  <body>
    <input type="range" min="1" max="3" value="1" onchange="changeImage(value)">
    <br><br>
    <img id="img" src="one.jpeg" width="300" height="400">
  </body>
  <script>
    function changeImage(value){
        if(value==1){
            document.getElementById("img").src ="one.jpeg";
        }
        else if(value==2){
            document.getElementById("img").src="two.jpeg";
        }
        else if(value==3){
            document.getElementById("img").src="three.jpeg";
        }
    }
  </script>
</html>
