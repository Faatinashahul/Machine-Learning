<!DOCTYPE html>
<html>
    <head>
        <title>Online Complaint Registration and Tracking System</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="index">
        <form action="register" method="post" onsubmit="return validateForm()" class="reg-box">
            <h2>Complaint Registration Form</h2>
            <div class="form-group">
                <label>Name:</label>
                <input type="text" name="name" id="name" class="btn1">
            </div>

            <div class="form-group">
                <label>Email:</label>
                <input type="text" name="email" id="email" class="btn1">
            </div>

            <div class="form-group">
                <label>Category:</label>
                <select name="category" id="category" class="btn1">
                    <option value="">Select:</option>
                    <option>Technical</option>
                    <option>Service</option>
                    <option>Product damage</option>
                </select>
            </div>

            <div class="form-group">
                <label>Description:</label>
                <textarea name="desc" id="desc" class="btn1"></textarea>
            </div>

            <input type="submit" value="Submit Request" class="btn">
        </form>
        <script src="/OnlineComplaintSystem/validate.js"></script>
    </body>
</html>
