<!DOCTYPE html>
<html>
    <title>ADD PAGE</title>
    <body>
        <form id="add-page" method="POST" action="addServlet">
            ID:<input type="text" id="pid" name="pid"><br><br>
            Name:<input type="text" id="pname" name="pname"><br><br>
            Age:<input type="text" id="age" name="age"><br><br>
            Gender:
            <select id="gender" name="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
            <br><br>
            Contact Number:<input type="text" id="no" name="no">
            <br><br>

            <button type="submit">ADD</button>
        </form>
        <p id="result"></p>
    <script>
        document.getElementById("add-page").addEventListener("submit",function(e){
            e.preventDefault();
            var pid=document.getElementById("pid").value;
            var pname=document.getElementById("pname").value;
            var age=document.getElementById("age").value;
            var gender=document.getElementById("gender").value;
            var no=document.getElementById("no").value;
            var xhr=new XMLHttpRequest();
            xhr.open("POST","addServlet",true);
            xhr.setRequestHeader("Content-Type","application/x-www-form-urlencoded");
            xhr.onreadystatechange=function(){
                if(xhr.readyState==4 && xhr.status ==200){
                    document.getElementById("result").innerHTML=xhr.responseText;
                }
            };
            xhr.send("pid="+pid+"&pname="+pname+"&age="+age+"&gender="+gender+"&no="+no);
        });
</script>
</body>
</html>
