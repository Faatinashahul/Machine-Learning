<!DOCTYPE html>
<html>
<head>
    <title>Country Auto Complete</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            background-image: url(background.png);
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            display: flex;
            justify-content: center;   
            align-items: center;       
        }
        .container {
            text-align: center;
        }
        input {
            width: 300px;
            padding: 10px;
            font-size: 16px;
        }
        #suggestions {
            border: 1px solid #ccc;
            width: 320px;
            background: white;
            text-align: left;
        }
        .item {
            padding: 8px;
            cursor: pointer;
        }
        .item:hover {
            background-color: rgb(34, 170, 233);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Country Search</h2>
        <input type="text" id="country" placeholder="Enter country name" autocomplete="off" onkeyup="fetchCountries()">
        <div id="suggestions"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
