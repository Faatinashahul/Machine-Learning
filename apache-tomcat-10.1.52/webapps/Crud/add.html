<!DOCTYPE html>
<html>
    <title>LMS Management</title>
    <head>

    </head>
    <body>
        <form id="add" method="POST" action="addServlet">
            Book name:<input type="text" id="bname" name="bname"><br>
            Author:<input type="text" id="author" name="author"><br>
            Year:<input type="text" id="year" name="year">
            <button type="submit">ADD</button>
        </form>
        <p id="result"></p>
    </body>
    <script>
        document.getElementById("add").addEventListener("submit",function(e){
            e.preventDefault();
            var xhr=new XMLHttpRequest();
            xhr.open("POST","addServlet",true);
            var bname=document.getElementById("bname").value;
            var author=document.getElementById("author").value;
            var year=document.getElementById("year").value;
            xhr.setRequestHeader("Content-type","application/x-www-form-urlencoded");
            xhr.onreadystatechange=function(){
                if(xhr.readyState==4 && xhr.status==200){
                    document.getElementById("result").innerHTML=xhr.responseText;
                }
            };
            xhr.send("bname="+bname+"&author="+author+"&year="+year);
        });
    </script>
</html>
